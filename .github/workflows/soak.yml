name: Soak

on:
  schedule:
    - cron: '43 4 * * 0' # weekly, Sunday 04:43 UTC
  workflow_dispatch:
    inputs:
      duration:
        description: 'Soak duration (Go duration, e.g. 10m)'
        default: '5m'

permissions:
  contents: read

jobs:
  soak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      # A mixed cross-service workload under sustained load, race detector on.
      - name: Soak
        env:
          SOAK_DURATION: ${{ github.event.inputs.duration || '5m' }}
        run: go test -tags soak -race -run TestSoak -timeout 24h -v ./cmd/doze-aws/
