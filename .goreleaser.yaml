# GoReleaser configuration — https://goreleaser.com
# Runs in CI on a `v*` tag (see .github/workflows/release.yml). Produces static,
# cross-platform binaries plus a checksums file; install.sh downloads and
# verifies these. Test the config locally with:
#   goreleaser release --snapshot --clean
version: 2

project_name: doze-aws

before:
  hooks:
    - go mod tidy

builds:
  - id: doze-aws
    main: ./cmd/doze-aws
    binary: doze-aws
    env:
      - CGO_ENABLED=0 # pure Go: fully static, no libc dependency.
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64 # uncommon; drop it to keep the asset list tidy.
    ldflags:
      - -s -w -X main.version={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: default
    # Matches what install.sh expects: doze-aws_<version>_<os>_<arch>.<ext>
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - NOTICE
      - doze-aws.example.toml

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"

release:
  draft: false
  prerelease: auto
  name_template: "doze-aws {{ .Version }}"
