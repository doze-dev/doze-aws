{{define "header"}}<!-- rendered by header/footer wrappers -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>doze-aws console</title>
<link rel="stylesheet" href="{{.Prefix}}/static/app.css">
<script src="{{.Prefix}}/static/htmx.min.js"></script>
<div class="app">
  <header class="topbar">
    <div class="tb-brand"><span class="tb-logo">◆</span> doze-aws <span class="tb-sub">console</span></div>
    <div class="tb-right">
      <span class="tb-chip">us-east-1</span>
      <span class="tb-chip mono">127.0.0.1:4566</span>
    </div>
  </header>
  <div class="body">
    <aside class="side">
      <nav>
        <a href="{{.Prefix}}/"    class="{{if eq .Page "overview"}}on{{end}}"><span class="ico ico-home">⌂</span> Overview</a>
        <a href="{{.Prefix}}/s3"  class="{{if eq .Page "s3_buckets"}}on{{end}}{{if eq .Page "s3_objects"}}on{{end}}"><span class="ico ico-s3">S3</span> S3</a>
        <a href="{{.Prefix}}/sqs" class="{{if eq .Page "sqs_queues"}}on{{end}}{{if eq .Page "sqs_queue"}}on{{end}}"><span class="ico ico-sqs">SQ</span> SQS</a>
      </nav>
      <div class="side-foot">doze-aws · local console</div>
    </aside>
    <main class="main">
{{end}}

{{define "footer"}}
    </main>
  </div>
</div>
{{end}}
