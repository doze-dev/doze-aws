{{define "s3_buckets"}}{{template "header" .}}
<div class="head-row">
  <h1>S3 buckets</h1>
  <form hx-post="{{.Prefix}}/s3/create" hx-target="#bucket-list" hx-swap="outerHTML"
        hx-on::after-request="this.reset()" class="inline-form">
    <input name="name" placeholder="new-bucket-name" required pattern="[a-z0-9.\-]{3,63}"
           title="3–63 chars, lowercase letters, digits, dots, hyphens">
    <button type="submit">Create</button>
  </form>
</div>
{{template "bucket_list" .}}
{{template "footer" .}}{{end}}

{{define "bucket_list"}}
<div id="bucket-list">
{{if .Buckets}}
<table class="grid">
  <thead><tr><th>Name</th><th>Created</th><th class="right">Actions</th></tr></thead>
  <tbody>{{range .Buckets}}
    <tr>
      <td><a href="{{$.Prefix}}/s3/{{.Name}}">📦 {{.Name}}</a></td>
      <td class="dim">{{.Created}}</td>
      <td class="right">
        <button class="ghost danger" hx-post="{{$.Prefix}}/s3/{{.Name}}/delete-bucket"
                hx-target="#bucket-list" hx-swap="outerHTML"
                hx-confirm="Delete bucket {{.Name}}? It must be empty.">Delete</button>
      </td>
    </tr>
  {{end}}</tbody>
</table>
{{else}}<p class="empty">No buckets yet. Create one above.</p>{{end}}
</div>
{{end}}
