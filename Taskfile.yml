# Taskfile for doze-aws. Run with `go tool task <name>` (task is a go tool
# dependency, so no separate install is needed). `go tool task --list` shows all.
#
# doze-aws is a standalone module inside a go workspace, so every go command runs
# with GOWORK=off (set globally below).
version: '3'

env:
  GOWORK: off

vars:
  BINARY: doze-aws

tasks:
  default:
    desc: List available tasks
    cmds:
      - go tool task --list
    silent: true

  build:
    desc: Build the emulator binary into bin/
    cmds:
      - go build -o bin/{{.BINARY}} ./cmd/doze-aws

  run:
    desc: Build and run the emulator (zero-config on 127.0.0.1:4566)
    deps: [build]
    cmds:
      - ./bin/{{.BINARY}}

  test:
    desc: Run the whole test suite (unit + SDK contract tests)
    cmds:
      - go test ./...

  test:unit:
    desc: Unit tests only — no servers, no SDK clients (contract tests are gated by -short)
    cmds:
      - go test -short ./...

  test:race:
    desc: Run the whole suite with the race detector
    cmds:
      - go test -race ./...

  vet:
    desc: go vet
    cmds:
      - go vet ./...

  check:
    desc: 'Pre-push gate: gofmt check, go vet, and the full race suite. Wire it as a git pre-push hook (task hooks:install).'
    cmds:
      - test -z "$(gofmt -l .)" || { echo 'gofmt needed:'; gofmt -l .; exit 1; }
      - go vet ./...
      - go test -race ./...

  hooks:install:
    desc: Install a git pre-push hook that runs `task check`.
    cmds:
      - mkdir -p .git/hooks
      - printf '#!/bin/sh\nexec go tool task check\n' > .git/hooks/pre-push
      - chmod +x .git/hooks/pre-push
      - echo 'installed .git/hooks/pre-push -> task check'

  fmt:
    desc: Format all Go files
    cmds:
      - gofmt -w .

  tidy:
    desc: go mod tidy
    cmds:
      - go mod tidy

  fuzz:
    desc: Fuzz the signature parser for 30s
    cmds:
      - go test ./internal/sigparse/ -run '^$' -fuzz FuzzParse -fuzztime 30s

  soak:
    desc: 'Cross-service soak under sustained load (SOAK_DURATION, default 2m)'
    env:
      SOAK_DURATION: '{{.SOAK_DURATION | default "2m"}}'
    cmds:
      - go test -tags soak -run TestSoak -timeout 24h -v ./cmd/doze-aws/

  test:e2e:
    desc: 'Playwright browser tests against the console UI (builds+boots a real binary; not part of check)'
    cmds:
      - cd e2e && bun install --frozen-lockfile
      - cd e2e && bunx playwright install --with-deps chromium
      - cd e2e && bunx playwright test

  clean:
    desc: Remove build output and local service data
    cmds:
      - rm -rf bin data e2e/.tmp
